# ==============================
# DOCKER COMPOSE CONFIGURATION
# ==============================
version: '3.8'

services:
  # Main Web Service
  web:
    build: .
    container_name: entertainment-tadka-bot
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./backups:/var/www/html/backups
      - ./logs:/var/www/html/logs
      - ./cache:/var/www/html/cache
      - ./database:/var/www/html/database
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - MAIN_CHANNEL_ID=-1003181705395
      - THEATER_CHANNEL_ID=-1002831605258
      - BACKUP_CHANNEL_ID=-1002964109368
      - REQUEST_CHANNEL_ID=-1003083386043
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - bot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: entertainment-tadka-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SQLite Database Service (with backup)
  db:
    image: alpine:latest
    container_name: entertainment-tadka-db
    volumes:
      - ./database:/database
      - ./backups:/backups
    command: >
      sh -c "
      apk add --no-cache sqlite &&
      while true; do
        sqlite3 /database/movies.db 'VACUUM;' &&
        cp /database/movies.db /backups/movies-$(date +%Y%m%d-%H%M%S).db &&
        find /backups -name '*.db' -mtime +7 -delete &&
        sleep 3600
      done
      "
    restart: unless-stopped
    networks:
      - bot-network

  # Backup Service
  backup:
    image: alpine:latest
    container_name: entertainment-tadka-backup
    volumes:
      - ./:/source:ro
      - ./backups:/backups
    command: >
      sh -c "
      apk add --no-cache zip &&
      while true; do
        TIMESTAMP=$$(date +%Y%m%d-%H%M%S) &&
        cd /source &&
        zip -r /backups/full-backup-$$TIMESTAMP.zip \
          index.php \
          movies.csv \
          users.json \
          bot_stats.json \
          movie_requests.json \
          database/*.db \
          --exclude 'backups/*' 'logs/*' 'cache/*' 'vendor/*' &&
        find /backups -name '*.zip' -mtime +3 -delete &&
        sleep 43200
      done
      "
    restart: unless-stopped
    networks:
      - bot-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: entertainment-tadka-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - bot-network

  # Monitoring Service
  monitor:
    image: grafana/grafana:latest
    container_name: entertainment-tadka-monitor
    ports:
      - "3000:3000"
    volumes:
      - monitor-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin@786
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    restart: unless-stopped
    networks:
      - bot-network

# Volumes
volumes:
  redis-data:
  monitor-data:

# Networks
networks:
  bot-network:
    driver: bridge