version: '3.8'

services:
  bot:
    build: .
    container_name: entertainment-bot
    ports:
      - "8080:80"
    environment:
      - ENVIRONMENT=development
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - WEBHOOK_URL=http://localhost:8080
      - PHP_MEMORY_LIMIT=512M
    volumes:
      - ./:/var/www/html
      - bot_database:/var/www/html/database
      - bot_backups:/var/www/html/backups
      - bot_cache:/var/www/html/cache
      - bot_logs:/var/www/html/logs
    networks:
      - bot_network
    restart: unless-stopped

networks:
  bot_network:
    driver: bridge

volumes:
  bot_database:
  bot_backups:
  bot_cache:
  bot_logs: