services:
  - type: web
    name: entertainment-tadka-bot
    runtime: docker
    repo: https://github.com/yourusername/entertainment-tadka-bot
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: MAIN_CHANNEL
        value: "@EntertainmentTadka786"
      - key: MAIN_CHANNEL_ID
        value: "-1003181705395"
      - key: THEATER_CHANNEL
        value: "@threater_print_movies"
      - key: THEATER_CHANNEL_ID
        value: "-1002831605258"
      - key: BACKUP_CHANNEL_USERNAME
        value: "@ETBackup"
      - key: BACKUP_CHANNEL_ID
        value: "-1002964109368"
      - key: REQUEST_CHANNEL
        value: "@EntertainmentTadka7860"
      - key: SERIAL_CHANNEL
        value: "@Entertainment_Tadka_Serial_786"
      - key: SERIAL_CHANNEL_ID
        value: "-1003614546520"
      - key: PRIVATE_CHANNEL_1_ID
        value: "-1003251791991"
      - key: PRIVATE_CHANNEL_2_ID
        value: "-1002337293281"

    plan: free
    region: oregon
    numInstances: 1
    autoDeploy: true
    
    healthCheckPath: /
    
    # Build filter to include necessary files
    buildFilter:
      paths:
        - index.php
        - Dockerfile
        - .htaccess
        - movies.csv
        - users.json
        - bot_stats.json
        - movie_requests.json
      ignoredPaths:
        - README.md
        - .gitignore
        - backups/
        - error.log
        - bot_activity.log

volumes:
  - name: bot-data
    sizeGB: 1
    mountPath: /var/www/html/backups
    
  - name: bot-logs
    sizeGB: 1
    mountPath: /var/www/html/logs

# Disk initialization script
diskInitCommands:
  - mkdir -p /var/www/html/backups
  - mkdir -p /var/www/html/logs
  - touch /var/www/html/movies.csv
  - touch /var/www/html/users.json
  - touch /var/www/html/bot_stats.json
  - touch /var/www/html/movie_requests.json
  - touch /var/www/html/bot_activity.log
  - touch /var/www/html/error.log
  - chmod 666 /var/www/html/*.csv
  - chmod 666 /var/www/html/*.json
  - chmod 666 /var/www/html/*.log
